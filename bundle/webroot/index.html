<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Public status and feed access for Haze Weather Radio">
    <title>Haze Weather Radio</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/assets/styles.css">
    <link rel="stylesheet" href="/assets/layout.css">
    <style>[hidden]{display:none!important}.brand-home-link{display:inline-flex;align-items:center;color:inherit;text-decoration:none}</style>
</head>
<body>
    <div class="app-shell public-app-shell">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <a class="brand-home-link" href="/" aria-label="Open public page">
                    <img class="brand-mark brand-mark-light" src="/assets/haze-alerting.svg" alt="Haze Alerting Platform">
                    <img class="brand-mark brand-mark-dark" src="/assets/haze-alerting-dark.svg" alt="" aria-hidden="true">
                </a>
            </div>

            <nav class="sidebar-section" aria-label="Navigation">
                <a class="sidebar-link" href="/" data-public-link="home">
                    <i data-lucide="house" width="15" height="15"></i>
                    Home
                </a>
                <a class="sidebar-link" href="/feeds" data-public-link="feeds">
                    <i data-lucide="radio" width="15" height="15"></i>
                    Feeds
                </a>
                <a class="sidebar-link" href="/alerts" data-public-link="alerts" id="publicAlertsLink" hidden>
                    <i data-lucide="bell-ring" width="15" height="15"></i>
                    Alerts
                </a>
                <a class="sidebar-link" id="adminLink" href="/admin">
                    <i data-lucide="shield" width="15" height="15"></i>
                    Admin Login
                </a>
            </nav>
        </aside>

        <div class="main-wrap">
            <main class="dashboard public-dashboard">
                <section class="public-home-section public-home-floating" id="publicSummary" hidden>
                    <div class="public-home-title">
                        <h1 id="publicSiteTitle">Haze Weather Radio</h1>
                        <p>Unified weather information, alerting, and public feed access.</p>
                    </div>

                    <div class="public-status-card">
                        <div class="public-status-grid" id="publicSummaryCards"></div>
                        <div class="public-build-row" id="publicBuildInfo"></div>
                    </div>

                    <div class="public-project-strip">
                        <p>Haze Unified Alerting Platform is an aggregator for weather information and emergency alerts.</p>
                        <div class="public-project-actions">
                            <a class="btn-action" href="https://github.com/meowraii/haze-weather-radio" target="_blank" rel="noreferrer">
                                <i data-lucide="github" width="14" height="14"></i>
                                <span>GitHub</span>
                            </a>
                        </div>
                    </div>
                </section>

                <section class="section-block" id="publicFeedsSection" hidden>
                    <p id="publicFeedNotice" class="status-banner">Checking feed access...</p>
                    <div class="feed-grid" id="publicFeedsGrid"></div>
                </section>

                <section class="section-block" id="publicListenSection" hidden>
                    <p id="publicListenNotice" class="status-banner">Checking feed access...</p>
                    <div id="publicListenPanel"></div>
                </section>

                <section class="section-block" id="publicAlertsSection" hidden>
                    <p id="publicAlertsNotice" class="status-banner">Checking alert archive...</p>
                    <div class="alert-tabs public-alert-tabs" role="tablist" aria-label="Alert archive">
                        <button class="alert-tab active" type="button" data-public-alert-tab="accepted">Accepted Alerts</button>
                        <button class="alert-tab" type="button" data-public-alert-tab="rejected">Rejected Alerts</button>
                        <button class="alert-tab" type="button" data-public-alert-tab="expired">Expired Alerts</button>
                    </div>
                    <div id="publicAlertsList" class="alerts-archive-list public-alert-list"></div>
                </section>
            </main>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="/assets/js/public.js?v=20260618-public-feed-cards"></script>
</body>
</html>
