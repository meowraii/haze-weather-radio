<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haze Banner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zalando+Sans+SemiExpanded:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --frame-width: 1920px;
            --frame-height: 1080px;
            --frame-scale: 1;
            --banner-height: 96px;
            --banner-bg: #ff6600;
            --banner-gradient: none;
            --banner-text: #ffffff;
            --banner-text-soft: rgba(255, 255, 255, 0.82);
            --banner-text-dim: rgba(255, 255, 255, 0.68);
            --text-main: #f8fafc;
            --text-soft: rgba(226, 232, 240, 0.82);
            --text-dim: rgba(148, 163, 184, 0.74);
            --ticker-font-size: 20px;
            --fullscreen-title-size: 48px;
            --fullscreen-body-size: 24px;
            --fullscreen-meta-size: 14px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background-color: transparent;
            color: var(--text-main);
            font-family: 'Zalando Sans SemiExpanded', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            display: block;
        }

        .frame {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--frame-width);
            height: var(--frame-height);
            overflow: hidden;
            isolation: isolate;
            transform-origin: top left;
            transform: scale(var(--frame-scale));
        }

        .frame[data-visible="false"] .ticker-shell,
        .frame[data-visible="false"] .fullscreen-shell {
            opacity: 0;
            pointer-events: none;
        }

        .frame[data-mode="ticker"] .fullscreen-shell,
        .frame[data-mode="fullscreen"] .ticker-shell {
            display: none;
        }

        .ticker-shell,
        .fullscreen-shell {
            position: absolute;
            inset: 0;
            transition: opacity 220ms ease;
        }

        .ticker-shell {
            display: block;
            width: 100%;
            height: var(--banner-height);
            top: 0;
            right: 0;
            bottom: auto;
            left: 0;
            background-color: var(--banner-bg);
            background-image: var(--banner-gradient);
            background-repeat: no-repeat;
            background-size: 100% 100%;
        }

        .ticker-window {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            clip-path: inset(-120px 0 -120px 0);
        }

        .ticker-track {
            position: relative;
            left: 0;
            display: flex;
            align-items: center;
            height: 100%;
            flex-wrap: nowrap;
            white-space: nowrap;
        }

        .ticker-entries {
            display: flex;
            align-items: center;
            height: 100%;
            flex-shrink: 0;
            padding: 0 36px;
            font-size: var(--ticker-font-size);
            line-height: 0.9;
            color: var(--banner-text);
            white-space: nowrap;
            text-shadow:
                0 0 10px rgba(0, 0, 0, 0.95),
                0 3px 0 rgba(0, 0, 0, 0.9),
                0 0 18px rgba(0, 0, 0, 0.9);
        }

        .fullscreen-shell {
            display: grid;
            width: 100%;
            height: 100%;
            background-color: var(--banner-bg);
            background-image: var(--banner-gradient);
            background-repeat: no-repeat;
            background-size: 100% 100%;
            color: var(--banner-text);
        }

        .fullscreen-card {
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 16px;
            width: 100%;
            height: 100%;
            padding: 18px 22px;
        }

        .fullscreen-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
        }

        .fullscreen-chip {
            display: inline-flex;
            align-items: center;
            min-height: 32px;
            padding: 0 14px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.16em;
            color: var(--banner-text);
            text-shadow:
                0 0 8px rgba(0, 0, 0, 0.95),
                0 2px 0 rgba(0, 0, 0, 0.9);
        }

        .fullscreen-counter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 68px;
            min-height: 32px;
            padding: 0 12px;
            font-size: 11px;
            letter-spacing: 0.12em;
            color: var(--banner-text-soft);
            text-shadow:
                0 0 8px rgba(0, 0, 0, 0.95),
                0 2px 0 rgba(0, 0, 0, 0.9);
        }

        .fullscreen-main {
            display: grid;
            grid-template-rows: auto auto 1fr;
            min-height: 0;
            gap: 16px;
        }

        .fullscreen-headline {
            margin: 0;
            font-size: var(--fullscreen-title-size);
            font-weight: 700;
            line-height: 0.96;
            letter-spacing: -0.04em;
            text-wrap: balance;
            text-shadow:
                0 0 12px rgba(0, 0, 0, 0.95),
                0 3px 0 rgba(0, 0, 0, 0.9),
                0 0 28px rgba(0, 0, 0, 0.92);
        }

        .fullscreen-meta {
            min-height: 1em;
            font-size: var(--fullscreen-meta-size);
            color: var(--banner-text-soft);
            letter-spacing: 0.12em;
            line-height: 1.6;
            text-shadow:
                0 0 8px rgba(0, 0, 0, 0.95),
                0 2px 0 rgba(0, 0, 0, 0.9);
        }

        .fullscreen-body {
            min-height: 0;
            font-size: var(--fullscreen-body-size);
            line-height: 1.34;
            color: var(--banner-text);
            white-space: pre-wrap;
            overflow: hidden;
            text-shadow:
                0 0 10px rgba(0, 0, 0, 0.95),
                0 2px 0 rgba(0, 0, 0, 0.9),
                0 0 22px rgba(0, 0, 0, 0.9);
        }

        .fullscreen-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            font-size: 12px;
            letter-spacing: 0.1em;
            color: var(--banner-text-dim);
            text-shadow:
                0 0 8px rgba(0, 0, 0, 0.95),
                0 2px 0 rgba(0, 0, 0, 0.9);
        }

        .measure-shell {
            position: fixed;
            top: -9999px;
            left: -9999px;
            visibility: hidden;
            pointer-events: none;
        }

        .measure-shell .fullscreen-shell {
            position: relative;
            width: var(--frame-width);
            height: var(--frame-height);
        }
    </style>
</head>
<body>
    <div class="frame" id="frame" data-mode="ticker" data-visible="false">
        <section class="ticker-shell" id="tickerShell" aria-live="polite">
            <div class="ticker-window" id="tickerWindow">
                <div class="ticker-track" id="tickerTrack"></div>
            </div>
        </section>

        <section class="fullscreen-shell" id="fullscreenShell" aria-live="polite">
            <div class="fullscreen-card">
                <header class="fullscreen-header">
                    <span class="fullscreen-chip" id="fullscreenChip">Alert</span>
                    <span class="fullscreen-counter" id="fullscreenCounter"></span>
                </header>
                <div class="fullscreen-main">
                    <h1 class="fullscreen-headline" id="fullscreenHeadline"></h1>
                    <div class="fullscreen-meta" id="fullscreenMeta"></div>
                    <div class="fullscreen-body" id="fullscreenBody"></div>
                </div>
                <footer class="fullscreen-footer">
                    <span id="fullscreenFeed"></span>
                    <span id="fullscreenExpires"></span>
                </footer>
            </div>
        </section>
    </div>

    <div class="measure-shell" aria-hidden="true">
        <section class="fullscreen-shell" id="measureShell">
            <div class="fullscreen-card">
                <header class="fullscreen-header">
                    <span class="fullscreen-chip" id="measureChip"></span>
                    <span class="fullscreen-counter" id="measureCounter"></span>
                </header>
                <div class="fullscreen-main">
                    <h1 class="fullscreen-headline" id="measureHeadline"></h1>
                    <div class="fullscreen-meta" id="measureMeta"></div>
                    <div class="fullscreen-body" id="measureBody"></div>
                </div>
                <footer class="fullscreen-footer">
                    <span id="measureFeed"></span>
                    <span id="measureExpires"></span>
                </footer>
            </div>
        </section>
    </div>

    <script>
        const API_BASE = '/api/v1';
        const PAGE_MS = 6000;
        const AUDIO_TRANSIENT_STATUS_DELAY_MS = 2000;
        const AUDIO_DISCONNECT_GRACE_MS = 15000;
        const AUDIO_STATS_INTERVAL_MS = 2000;
        const AUDIO_STAGNANT_STATS_POLLS = 3;
        const AUDIO_RECOVER_STATS_POLLS = 15;
        const AUDIO_MEDIA_EVENT_GRACE_MS = 12000;
        const AUDIO_RECENT_PACKET_GRACE_MS = 30000;
        const AUDIO_PLAYBACK_WATCHDOG_MS = 2500;
        const WEBRTC_AUDIO_CODECS = new Set(['auto', 'opus', 'g722', 'pcmu']);

        const frame = document.getElementById('frame');
        const tickerWindow = document.getElementById('tickerWindow');
        const tickerTrack = document.getElementById('tickerTrack');
        const fullscreenChip = document.getElementById('fullscreenChip');
        const fullscreenCounter = document.getElementById('fullscreenCounter');
        const fullscreenHeadline = document.getElementById('fullscreenHeadline');
        const fullscreenMeta = document.getElementById('fullscreenMeta');
        const fullscreenBody = document.getElementById('fullscreenBody');
        const fullscreenFeed = document.getElementById('fullscreenFeed');
        const fullscreenExpires = document.getElementById('fullscreenExpires');
        const measureHeadline = document.getElementById('measureHeadline');
        const measureMeta = document.getElementById('measureMeta');
        const measureBody = document.getElementById('measureBody');
        const measureFeed = document.getElementById('measureFeed');
        const measureExpires = document.getElementById('measureExpires');

        const state = {
            signature: '',
            pages: [],
            pageIndex: 0,
            pageTimer: null,
            payload: null,
            stream: null,
            audioPeer: null,
            audioReceiver: null,
            audioTrackId: '',
            audioRemoteStream: null,
            audioFallbackStream: null,
            audioRetryCount: 0,
            audioElement: null,
            audioReconnectTimer: null,
            audioReconnectPending: false,
            audioDisconnectTimer: null,
            audioStatsTimer: null,
            audioPlaybackWatchdogTimer: null,
            audioLastStats: null,
            audioLastPacketAt: 0,
            audioTrackAttached: false,
            audioStagnantStatsPolls: 0,
            audioMissingStatsPolls: 0,
            obsController: null,
            unloading: false,
            tickerDormantSignature: '',
            tickerScroller: null,
            tickerQueue: [],
            tickerCurrentKey: '',
            tickerLeadKey: '',
            tickerPlayedKeys: [],
        };

        function recordBannerAudioEvent(event, details = {}) {
            const events = window.hazeBannerWebRTCEvents || [];
            events.push({
                event,
                ...details,
                at: new Date().toISOString(),
            });
            window.hazeBannerWebRTCEvents = events.slice(-80);
        }

        window.hazeDumpBannerWebRTC = function hazeDumpBannerWebRTC() {
            const audio = state.audioElement || null;
            return {
                at: new Date().toISOString(),
                query_feed: query.feed || '',
                audio_enabled: Boolean(query.audio),
                connection_state: state.audioPeer?.connectionState || '',
                ice_state: state.audioPeer?.iceConnectionState || '',
                signaling_state: state.audioPeer?.signalingState || '',
                track_attached: Boolean(state.audioTrackAttached),
                has_live_track: hasLiveBannerAudioTrack(),
                last_packet_age_ms: state.audioLastPacketAt ? Date.now() - state.audioLastPacketAt : null,
                packets_recent: hasRecentBannerAudioPackets(),
                playback_watchdog_active: Boolean(state.audioPlaybackWatchdogTimer),
                stagnant_stats_polls: Number(state.audioStagnantStatsPolls || 0),
                missing_stats_polls: Number(state.audioMissingStatsPolls || 0),
                reconnect_pending: Boolean(state.audioReconnectPending || state.audioReconnectTimer),
                disconnect_reconnect_pending: Boolean(state.audioDisconnectTimer),
                retry_count: Number(state.audioRetryCount || 0),
                audio: audio ? {
                    paused: audio.paused,
                    ended: audio.ended,
                    ready_state: audio.readyState,
                    network_state: audio.networkState,
                    muted: audio.muted,
                    volume: audio.volume,
                    stream_track_count: audio.srcObject?.getAudioTracks?.().length || 0,
                } : null,
                stats: window.hazeBannerWebRTCStats || null,
                events: (window.hazeBannerWebRTCEvents || []).slice(-30),
            };
        };

        const ASPECT_RESOLUTIONS = {
            '16:9': { width: 1920, height: 1080 },
            '4:3': { width: 1440, height: 1080 },
            '3:2': { width: 1620, height: 1080 },
        };

        class TickerScroller {
            constructor(viewport, track, speedProvider, onFinished) {
                this.viewport = viewport;
                this.track = track;
                this.speedProvider = speedProvider;
                this.onFinished = onFinished;
                this.raf = null;
                this.trackOffset = 0;
                this.entriesWidth = 0;
                this.entryOffset = 0;
                this.lastTimestamp = null;
                this.state = 'idle';
                this.entriesEl = null;
                this.maxPasses = Number.POSITIVE_INFINITY;
                this.completedPasses = 0;
                this.boundTick = (timestamp) => this.tick(timestamp);
            }

            setMessage(text, maxPasses) {
                this.stop();
                const entries = document.createElement('div');
                entries.className = 'ticker-entries';
                entries.textContent = text;
                this.track.append(entries);
                this.entriesEl = entries;
                this.entriesWidth = entries.scrollWidth;
                this.maxPasses = maxPasses;
                this.completedPasses = 0;
                this.loadPass();
                this.start();
            }

            loadPass() {
                const viewportWidth = this.viewport.offsetWidth;
                this.trackOffset = viewportWidth;
                this.entryOffset = 0;
                this.lastTimestamp = null;
                this.track.style.left = `${viewportWidth}px`;
                if (this.entriesEl) {
                    this.entriesEl.style.marginLeft = '0px';
                }
                this.state = 'scrolling';
            }

            advancePass() {
                this.completedPasses += 1;
                if (this.maxPasses !== Number.POSITIVE_INFINITY && this.completedPasses >= this.maxPasses) {
                    this.stop();
                    if (this.onFinished) {
                        this.onFinished();
                    }
                    return;
                }
                this.loadPass();
            }

            tick(timestamp) {
                if (!this.entriesEl) {
                    this.raf = requestAnimationFrame(this.boundTick);
                    return;
                }

                const delta = this.lastTimestamp === null ? 0 : timestamp - this.lastTimestamp;
                this.lastTimestamp = timestamp;
                const speedPxPerMs = this.speedProvider();

                if (this.state === 'scrolling') {
                    this.trackOffset -= speedPxPerMs * delta;
                    this.track.style.left = `${this.trackOffset}px`;

                    if (this.trackOffset <= 0) {
                        this.entryOffset = 0;
                        this.lastTimestamp = null;
                        this.state = 'held';
                    }
                } else if (this.state === 'held') {
                    this.entryOffset -= speedPxPerMs * delta;
                    this.entriesEl.style.marginLeft = `${this.entryOffset}px`;

                    const rightEdge = this.trackOffset + this.entryOffset + this.entriesWidth;
                    if (rightEdge <= 0) {
                        this.lastTimestamp = null;
                        this.advancePass();
                    }
                }

                if (this.raf !== null) {
                    this.raf = requestAnimationFrame(this.boundTick);
                }
            }

            start() {
                if (this.raf !== null) {
                    cancelAnimationFrame(this.raf);
                }
                this.raf = requestAnimationFrame(this.boundTick);
            }

            stop() {
                if (this.raf !== null) {
                    cancelAnimationFrame(this.raf);
                    this.raf = null;
                }
                this.track.innerHTML = '';
                this.track.style.left = '0px';
                this.trackOffset = 0;
                this.entriesWidth = 0;
                this.entryOffset = 0;
                this.lastTimestamp = null;
                this.state = 'idle';
                this.entriesEl = null;
            }
        }

        function parseAspect(value) {
            const normalized = String(value || '').trim().replace(/x|\//g, ':');
            return ASPECT_RESOLUTIONS[normalized] ? normalized : '16:9';
        }

        function parseQuery() {
            const params = new URLSearchParams(window.location.search);
            const rawType = String(params.get('type') || 'ticker').trim().toLowerCase();
            const scroll = Number.parseInt(params.get('scroll') || '1', 10);
            const speed = Number.parseFloat(params.get('speed') || '240');
            const aspectKey = parseAspect(params.get('aspect'));
            const audio = String(params.get('audio') || '').trim().toLowerCase();
            const fragment = new URLSearchParams(String(window.location.hash || '').replace(/^#/, ''));
            const obsPassword = String(fragment.get('obsPassword') || params.get('obsPassword') || '').trim();
            const obsUrl = String(
                params.get('obsWebSocketUrl')
                || params.get('obsWsUrl')
                || params.get('obsUrl')
                || 'ws://127.0.0.1:4455'
            ).trim();

            return {
                feed: String(params.get('feed') || '').trim(),
                aspectKey,
                aspect: ASPECT_RESOLUTIONS[aspectKey],
                type: rawType === 'fullscreen' ? 'fullscreen' : 'ticker',
                scroll: Number.isFinite(scroll) && scroll >= 0 ? scroll : 1,
                speed: Number.isFinite(speed) && speed > 0 ? speed : 30,
                audio: ['1', 'true', 'yes', 'on'].includes(audio),
                audioCodec: parseWebRTCAudioCodec(params.get('audioCodec') || params.get('codec')),
                obs: {
                    url: obsUrl,
                    password: obsPassword,
                    sources: parseOBSProgramSources(params.get('obsProgramSources')),
                    restore: String(params.get('obsRestore') || 'previous').trim().toLowerCase() === 'unmute' ? 'unmute' : 'previous',
                },
            };
        }

        function parseWebRTCAudioCodec(value) {
            const codec = String(value || '').trim().toLowerCase().replace('.', '');
            if (!codec) return 'auto';
            if (codec === 'stable') return 'pcmu';
            if (codec === 'g711u' || codec === 'ulaw' || codec === 'mulaw' || codec === 'u-law') return 'pcmu';
            if (codec === 'g722' || codec === 'g.722') return 'g722';
            return WEBRTC_AUDIO_CODECS.has(codec) ? codec : 'pcmu';
        }

        const query = parseQuery();

        function parseOBSProgramSources(value) {
            return String(value || '')
                .split(',')
                .map((source) => source.trim())
                .filter(Boolean)
                .filter((source, index, sources) => sources.indexOf(source) === index)
                .filter((source) => source.length <= 128)
                .slice(0, 32);
        }

        function validOBSWebSocketURL(value) {
            try {
                const url = new URL(value);
                return ['ws:', 'wss:'].includes(url.protocol) ? url.toString() : '';
            } catch {
                return '';
            }
        }

        function applyViewportScale() {
            const viewportWidth = Math.max(window.innerWidth || document.documentElement.clientWidth || 1920, 320);
            const viewportHeight = Math.max(window.innerHeight || document.documentElement.clientHeight || 1080, 240);
            const scale = Math.min(viewportWidth / query.aspect.width, viewportHeight / query.aspect.height);

            document.documentElement.style.setProperty('--frame-width', `${query.aspect.width}px`);
            document.documentElement.style.setProperty('--frame-height', `${query.aspect.height}px`);
            document.documentElement.style.setProperty('--frame-scale', `${scale}`);
        }

        function applyFrameSettings() {
            applyViewportScale();
            frame.dataset.mode = query.type;
            syncMetrics();
        }

        function syncMetrics() {
            const renderHeight = query.aspect.height;
            const bannerHeight = Math.round(renderHeight * 0.0888888889);

            document.documentElement.style.setProperty('--banner-height', `${bannerHeight}px`);
            frame.style.setProperty('--ticker-font-size', `${Math.max(56, Math.round(bannerHeight * 0.60))}px`);
            frame.style.setProperty('--fullscreen-title-size', `${Math.max(72, Math.round(renderHeight * 0.15))}px`);
            frame.style.setProperty('--fullscreen-body-size', `${Math.max(28, Math.round(renderHeight * 0.06))}px`);
            frame.style.setProperty('--fullscreen-meta-size', `${Math.max(18, Math.round(renderHeight * 0.026))}px`);

            if (state.payload && query.type === 'fullscreen' && state.payload.active) {
                state.pages = buildPages(state.payload.alerts || []);
                state.pageIndex = Math.min(state.pageIndex, Math.max(0, state.pages.length - 1));
                renderFullscreenPage();
                restartPageCycle();
            }
        }

        function applyAccent(color, gradientStops) {
            const colors = Array.isArray(gradientStops)
                ? gradientStops.map((stop) => String(stop || '').trim()).filter(Boolean)
                : [];
            let gradient = 'none';

            if (colors.length === 1) {
                gradient = `linear-gradient(180deg, ${colors[0]} 0%, ${colors[0]} 100%)`;
            } else if (colors.length > 1) {
                gradient = `linear-gradient(180deg, ${colors[colors.length - 1]} 0%, ${colors[0]} 50%, ${colors[colors.length - 1]} 100%)`;
            }

            frame.style.setProperty('--banner-bg', color || '#ff6600');
            frame.style.setProperty('--banner-gradient', gradient);
            frame.style.setProperty('--banner-text', '#ffffff');
            frame.style.setProperty('--banner-text-soft', 'rgba(255, 255, 255, 0.82)');
            frame.style.setProperty('--banner-text-dim', 'rgba(255, 255, 255, 0.68)');
        }

        function setVisible(visible) {
            frame.dataset.visible = visible ? 'true' : 'false';
        }

        class OBSMuteController {
            constructor(config) {
                this.url = validOBSWebSocketURL(config.url) || 'ws://127.0.0.1:4455';
                this.password = config.password || '';
                this.sources = Array.isArray(config.sources) ? config.sources : [];
                this.restore = config.restore === 'unmute' ? 'unmute' : 'previous';
                this.socket = null;
                this.connected = false;
                this.connecting = null;
                this.requestId = 0;
                this.pending = new Map();
                this.savedMute = new Map();
                this.desiredActive = false;
                this.appliedActive = false;
                this.applying = false;
                this.retryTimer = null;
            }

            get enabled() {
                return this.sources.length > 0 && Boolean(this.url);
            }

            setAlertActive(active) {
                if (!this.enabled) {
                    return;
                }
                this.desiredActive = Boolean(active);
                this.applyDesiredState();
            }

            async applyDesiredState() {
                if (this.applying || !this.enabled) {
                    return;
                }
                this.applying = true;
                try {
                    while (this.appliedActive !== this.desiredActive) {
                        const active = this.desiredActive;
                        await this.connect();
                        if (active) {
                            await this.muteSources();
                        } else {
                            await this.restoreSources();
                        }
                        this.appliedActive = active;
                    }
                } catch (error) {
                    console.error('OBS source mute sync failed.', error);
                    this.scheduleRetry();
                } finally {
                    this.applying = false;
                    if (this.appliedActive !== this.desiredActive) {
                        this.applyDesiredState();
                    }
                }
            }

            connect() {
                if (this.connected && this.socket?.readyState === WebSocket.OPEN) {
                    return Promise.resolve();
                }
                if (this.connecting) {
                    return this.connecting;
                }
                this.connecting = new Promise((resolve, reject) => {
                    const socket = new WebSocket(this.url);
                    let settled = false;
                    const fail = (error) => {
                        if (!settled) {
                            settled = true;
                            reject(error instanceof Error ? error : new Error(String(error || 'OBS websocket failed')));
                        }
                    };
                    socket.onopen = () => {
                        this.socket = socket;
                    };
                    socket.onerror = () => fail(new Error('OBS websocket connection failed'));
                    socket.onclose = () => {
                        this.connected = false;
                        this.socket = null;
                        fail(new Error('OBS websocket closed'));
                        this.failPending(new Error('OBS websocket closed'));
                        if (this.desiredActive || this.appliedActive) {
                            this.scheduleRetry();
                        }
                    };
                    socket.onmessage = (event) => {
                        let message;
                        try {
                            message = JSON.parse(event.data);
                        } catch {
                            return;
                        }
                        this.handleMessage(message, () => {
                            if (!settled) {
                                settled = true;
                                resolve();
                            }
                        }, fail).catch(fail);
                    };
                }).finally(() => {
                    this.connecting = null;
                });
                return this.connecting;
            }

            async handleMessage(message, resolveIdentified, rejectIdentified) {
                const op = Number(message?.op);
                const data = message?.d || {};
                if (op === 0) {
                    try {
                        await this.identify(data);
                    } catch (error) {
                        rejectIdentified(error);
                    }
                    return;
                }
                if (op === 2) {
                    this.connected = true;
                    resolveIdentified();
                    return;
                }
                if (op === 7) {
                    const requestId = String(data.requestId || '');
                    const pending = this.pending.get(requestId);
                    if (!pending) {
                        return;
                    }
                    this.pending.delete(requestId);
                    if (data.requestStatus?.result) {
                        pending.resolve(data.responseData || {});
                    } else {
                        pending.reject(new Error(data.requestStatus?.comment || 'OBS request failed'));
                    }
                }
            }

            async identify(hello) {
                const identify = {
                    op: 1,
                    d: {
                        rpcVersion: Number(hello.rpcVersion) || 1,
                        eventSubscriptions: 0,
                    },
                };
                if (hello.authentication) {
                    if (!this.password) {
                        throw new Error('OBS websocket requires a password');
                    }
                    identify.d.authentication = await obsAuthentication(
                        this.password,
                        hello.authentication.salt,
                        hello.authentication.challenge,
                    );
                }
                this.send(identify);
            }

            request(requestType, requestData) {
                if (!this.socket || this.socket.readyState !== WebSocket.OPEN) {
                    return Promise.reject(new Error('OBS websocket is not connected'));
                }
                const requestId = `haze-${Date.now()}-${++this.requestId}`;
                return new Promise((resolve, reject) => {
                    this.pending.set(requestId, { resolve, reject });
                    this.send({
                        op: 6,
                        d: { requestType, requestId, requestData: requestData || {} },
                    });
                });
            }

            send(message) {
                if (!this.socket || this.socket.readyState !== WebSocket.OPEN) {
                    throw new Error('OBS websocket is not connected');
                }
                this.socket.send(JSON.stringify(message));
            }

            async muteSources() {
                for (const inputName of this.sources) {
                    if (!this.savedMute.has(inputName)) {
                        try {
                            const current = await this.request('GetInputMute', { inputName });
                            this.savedMute.set(inputName, Boolean(current.inputMuted));
                        } catch {
                            this.savedMute.set(inputName, false);
                        }
                    }
                    await this.request('SetInputMute', { inputName, inputMuted: true });
                }
            }

            async restoreSources() {
                for (const inputName of this.sources) {
                    const inputMuted = this.restore === 'unmute' ? false : Boolean(this.savedMute.get(inputName));
                    await this.request('SetInputMute', { inputName, inputMuted });
                }
                this.savedMute.clear();
            }

            scheduleRetry() {
                if (this.retryTimer || state.unloading || !this.enabled) {
                    return;
                }
                this.retryTimer = window.setTimeout(() => {
                    this.retryTimer = null;
                    this.applyDesiredState();
                }, 2000);
            }

            failPending(error) {
                for (const pending of this.pending.values()) {
                    pending.reject(error);
                }
                this.pending.clear();
            }
        }

        async function obsAuthentication(password, salt, challenge) {
            if (!window.crypto?.subtle) {
                throw new Error('OBS authentication requires Web Crypto support');
            }
            const secret = await sha256Base64(`${password || ''}${salt || ''}`);
            return sha256Base64(`${secret}${challenge || ''}`);
        }

        async function sha256Base64(value) {
            const encoded = new TextEncoder().encode(value);
            const digest = await window.crypto.subtle.digest('SHA-256', encoded);
            let binary = '';
            for (const byte of new Uint8Array(digest)) {
                binary += String.fromCharCode(byte);
            }
            return window.btoa(binary);
        }

        function syncOBSAlertState(active) {
            if (!state.obsController && query.obs.sources.length) {
                state.obsController = new OBSMuteController(query.obs);
            }
            state.obsController?.setAlertActive(active);
        }

        function stopTicker() {
            if (state.tickerScroller) {
                state.tickerScroller.stop();
            }
            state.tickerQueue = [];
            state.tickerCurrentKey = '';
            state.tickerLeadKey = '';
            state.tickerPlayedKeys = [];
        }

        function tickerPixelsPerMs() {
            return Math.max(0.06, query.speed / 1000);
        }

        function startTicker(text) {
            const content = String(text || '').trim();
            if (!content) {
                return;
            }
            const maxPasses = query.scroll === 0 ? Number.POSITIVE_INFINITY : Math.max(1, query.scroll);
            if (!state.tickerScroller) {
                state.tickerScroller = new TickerScroller(
                    tickerWindow,
                    tickerTrack,
                    tickerPixelsPerMs,
                    () => {
                        playNextTickerItem();
                    },
                );
            }
            state.tickerScroller.setMessage(content, maxPasses);
        }

        function tickerAlertKey(alert) {
            return String(
                alert.identifier
                || alert.display_id
                || alert.received_at
                || `${alert.headline || ''}|${alert.expires_at || ''}`
            ).trim();
        }

        function buildTickerMessage(alert) {
            if (alert.message) {
                return alert.message;
            }
            return [alert.headline, alert.area_text, alert.expires_display ? `Until ${alert.expires_display}` : '']
                .map((part) => String(part || '').trim())
                .filter(Boolean)
                .join('. ');
        }

        function buildTickerItems(payload) {
            return (payload.alerts || [])
                .map((alert) => ({
                    key: tickerAlertKey(alert),
                    text: buildTickerMessage(alert),
                    backgroundColor: alert.background_color || payload.primary_color || '#ff6600',
                    backgroundGradient: alert.background_gradient || payload.primary_gradient || [],
                }))
                .filter((item) => item.key && item.text);
        }

        function playNextTickerItem() {
            const next = state.tickerQueue.shift();

            if (!next) {
                state.tickerCurrentKey = '';
                state.tickerDormantSignature = state.signature;
                setVisible(false);
                return;
            }

            state.tickerCurrentKey = next.key;
            if (!state.tickerPlayedKeys.includes(next.key)) {
                state.tickerPlayedKeys.push(next.key);
            }
            applyAccent(next.backgroundColor, next.backgroundGradient);
            startTicker(next.text);
        }

        function buildMeta(alert) {
            const parts = [];
            if (alert.issuer) parts.push(alert.issuer);
            if (alert.area_text) parts.push(alert.area_text);
            if (alert.display_id) parts.push(alert.display_id);
            return parts.join(' • ');
        }

        function buildBodyText(alert) {
            return [alert.description, alert.instruction].filter(Boolean).join('\n\n') || alert.message || '';
        }

        function paginateAlert(alert) {
            const bodyText = buildBodyText(alert);
            const words = bodyText.split(/\s+/).filter(Boolean);
            const pages = [];
            let current = '';

            measureHeadline.textContent = alert.headline || 'Alert';
            measureMeta.textContent = buildMeta(alert);
            measureFeed.textContent = `${(state.payload?.feed_name || state.payload?.feed_id || '')} · ${(alert.severity || 'Alert')}`;
            measureExpires.textContent = alert.expires_display ? `Until ${alert.expires_display}` : '';

            for (const word of words) {
                const candidate = current ? `${current} ${word}` : word;
                measureBody.textContent = candidate;
                if (measureBody.scrollHeight > measureBody.clientHeight + 1 && current) {
                    pages.push(current);
                    current = word;
                    measureBody.textContent = current;
                } else {
                    current = candidate;
                }
            }

            if (current) {
                pages.push(current);
            }

            return pages.length ? pages : [''];
        }

        function buildPages(alerts) {
            const pages = [];
            for (const alert of alerts) {
                const chunks = paginateAlert(alert);
                for (const chunk of chunks) {
                    pages.push({
                        ...alert,
                        meta: buildMeta(alert),
                        body: chunk,
                    });
                }
            }
            return pages;
        }

        function clearPageCycle() {
            if (state.pageTimer) {
                window.clearInterval(state.pageTimer);
                state.pageTimer = null;
            }
        }

        function restartPageCycle() {
            clearPageCycle();
            if (state.pages.length <= 1) {
                return;
            }
            state.pageTimer = window.setInterval(() => {
                state.pageIndex = (state.pageIndex + 1) % state.pages.length;
                renderFullscreenPage();
            }, PAGE_MS);
        }

        function renderFullscreenPage() {
            const page = state.pages[state.pageIndex];
            if (!page) {
                return;
            }
            applyAccent(
                page.background_color || state.payload.primary_color || '#ff6600',
                page.background_gradient || state.payload.primary_gradient || [],
            );
            fullscreenChip.textContent = page.severity === 'Unknown' ? 'Alert' : page.severity;
            fullscreenCounter.textContent = `${state.pageIndex + 1} / ${state.pages.length}`;
            fullscreenHeadline.textContent = page.headline || 'Alert';
            fullscreenMeta.textContent = page.meta || '';
            fullscreenBody.textContent = page.body || '';
            fullscreenFeed.textContent = `${(state.payload.feed_name || state.payload.feed_id || '')} · ${(page.severity || 'Alert')}`;
            fullscreenExpires.textContent = page.expires_display ? `Until ${page.expires_display}` : '';
        }

        function renderIdle() {
            setVisible(false);
            stopTicker();
            clearPageCycle();
            state.pages = [];
            state.pageIndex = 0;
        }

        function renderTicker(payload, signatureChanged) {
            const items = buildTickerItems(payload);
            const firstItem = items[0] || null;
            const currentStillPresent = items.some((item) => item.key === state.tickerCurrentKey);
            const leadChanged = Boolean(state.tickerLeadKey) && firstItem && firstItem.key !== state.tickerLeadKey;

            if (!firstItem) {
                renderIdle();
                return;
            }

            if (!signatureChanged && state.tickerCurrentKey) {
                return;
            }

            if (!state.tickerCurrentKey) {
                state.tickerLeadKey = firstItem.key;
                state.tickerPlayedKeys = [];
                state.tickerQueue = items.slice(1);
                state.tickerScroller?.stop();
                playNextTickerItem();
                return;
            }

            if (!currentStillPresent || (leadChanged && state.tickerCurrentKey === state.tickerLeadKey)) {
                state.tickerLeadKey = firstItem.key;
                state.tickerPlayedKeys = [];
                state.tickerQueue = items.slice(1);
                state.tickerScroller?.stop();
                playNextTickerItem();
                return;
            }

            state.tickerLeadKey = firstItem.key;
            state.tickerQueue = items.filter((item) => item.key !== state.tickerCurrentKey && !state.tickerPlayedKeys.includes(item.key));

            if (!state.tickerScroller || state.tickerScroller.state === 'idle') {
                playNextTickerItem();
            }
        }

        function renderFullscreen(payload, signatureChanged) {
            if (signatureChanged) {
                state.pages = buildPages(payload.alerts || []);
                state.pageIndex = 0;
                restartPageCycle();
            }
            renderFullscreenPage();
        }

        function renderPayload(payload) {
            const signatureChanged = payload.signature !== state.signature;
            state.signature = payload.signature;
            state.payload = payload;
            const hasActiveAlerts = Boolean(payload.active && (payload.alerts || []).length);
            syncOBSAlertState(hasActiveAlerts);

            if (signatureChanged) {
                state.tickerDormantSignature = '';
            }

            if (!hasActiveAlerts) {
                renderIdle();
                return;
            }

            setVisible(true);
            if (query.type === 'fullscreen') {
                renderFullscreen(payload, signatureChanged);
                stopTicker();
            } else {
                renderTicker(payload, signatureChanged);
                clearPageCycle();
            }
        }

        function streamUrl() {
            const requestUrl = new URL(`${API_BASE}/banner/stream`, window.location.origin);
            if (query.feed) {
                requestUrl.searchParams.set('feed', query.feed);
            }
            return requestUrl;
        }

        function closeStream() {
            if (state.stream) {
                state.stream.close();
                state.stream = null;
            }
        }

        function bannerAudioElement() {
            if (state.audioElement) {
                return state.audioElement;
            }
            let audio = document.getElementById('bannerWebRTCAudio');
            if (!audio) {
                audio = document.createElement('audio');
                audio.id = 'bannerWebRTCAudio';
                audio.setAttribute('aria-hidden', 'true');
                audio.style.position = 'fixed';
                audio.style.width = '1px';
                audio.style.height = '1px';
                audio.style.opacity = '0';
                audio.style.pointerEvents = 'none';
                document.body.appendChild(audio);
            }
            audio.autoplay = true;
            audio.playsInline = true;
            audio.muted = false;
            audio.volume = 1;
            if (audio.dataset.hazeSinkBound !== '1') {
                audio.dataset.hazeSinkBound = '1';
                audio.addEventListener('pause', () => {
                    recordBannerAudioEvent('audio_pause', {
                        ready_state: audio.readyState,
                        network_state: audio.networkState,
                        ended: audio.ended,
                        packets_recent: hasRecentBannerAudioPackets(),
                    });
                    if (hasRecentBannerAudioPackets()) {
                        ensureBannerAudioPlaying();
                    }
                });
                audio.addEventListener('playing', () => {
                    recordBannerAudioEvent('audio_playing', {
                        ready_state: audio.readyState,
                        network_state: audio.networkState,
                    });
                });
            }
            state.audioElement = audio;
            return audio;
        }

        function closeAudioStream() {
            if (state.audioReconnectTimer) {
                window.clearTimeout(state.audioReconnectTimer);
                state.audioReconnectTimer = null;
            }
            state.audioReconnectPending = false;
            if (state.audioDisconnectTimer) {
                window.clearTimeout(state.audioDisconnectTimer);
                state.audioDisconnectTimer = null;
            }
            stopAudioStatsMonitor();
            stopAudioPlaybackWatchdog();
            state.audioTrackAttached = false;
            state.audioReceiver = null;
            state.audioTrackId = '';
            state.audioRemoteStream = null;
            state.audioLastStats = null;
            state.audioLastPacketAt = 0;
            state.audioStagnantStatsPolls = 0;
            state.audioMissingStatsPolls = 0;
            state.audioFallbackStream = null;
            if (state.audioPeer) {
                state.audioPeer.ontrack = null;
                state.audioPeer.onconnectionstatechange = null;
                state.audioPeer.close();
                state.audioPeer = null;
            }
            if (state.audioElement) {
                state.audioElement.pause();
                state.audioElement.srcObject = null;
                state.audioElement.removeAttribute('src');
            }
        }

        function stopAudioStatsMonitor() {
            if (state.audioStatsTimer) {
                window.clearInterval(state.audioStatsTimer);
                state.audioStatsTimer = null;
            }
        }

        function startAudioPlaybackWatchdog() {
            stopAudioPlaybackWatchdog();
            state.audioPlaybackWatchdogTimer = window.setInterval(() => {
                const peer = state.audioPeer;
                if (!query.audio || state.unloading || !peer || peer.connectionState === 'closed') {
                    stopAudioPlaybackWatchdog();
                    return;
                }
                if (hasRecentBannerAudioPackets()) {
                    ensureBannerAudioPlaying();
                }
            }, AUDIO_PLAYBACK_WATCHDOG_MS);
        }

        function stopAudioPlaybackWatchdog() {
            if (state.audioPlaybackWatchdogTimer) {
                window.clearInterval(state.audioPlaybackWatchdogTimer);
                state.audioPlaybackWatchdogTimer = null;
            }
        }

        function startAudioStatsMonitor(peer) {
            stopAudioStatsMonitor();
            if (!peer?.getStats) return;
            state.audioLastStats = null;
            state.audioStagnantStatsPolls = 0;
            state.audioMissingStatsPolls = 0;
            state.audioStatsTimer = window.setInterval(async () => {
                if (state.audioPeer !== peer || peer.connectionState === 'closed') {
                    stopAudioStatsMonitor();
                    return;
                }
                try {
                    const statsResult = await readActiveInboundAudioStats(state.audioReceiver, peer, state.audioTrackId);
                    const snapshot = statsResult?.snapshot || null;
                    if (!snapshot) {
                        if (peer.connectionState === 'connected') {
                            state.audioMissingStatsPolls += 1;
                            state.audioStagnantStatsPolls = 0;
                            if (state.audioMissingStatsPolls === AUDIO_STAGNANT_STATS_POLLS) {
                                console.warn('Banner WebRTC inbound audio stats are missing.', {
                                    connection_state: peer.connectionState,
                                    ice_state: peer.iceConnectionState,
                                    track_attached: state.audioTrackAttached,
                                    at: new Date().toISOString(),
                                });
                            }
                            if (shouldReconnectBannerAudioForMissingPackets() && state.audioMissingStatsPolls >= AUDIO_RECOVER_STATS_POLLS) {
                                scheduleAudioReconnect({ force: true });
                            }
                        }
                        return;
                    }
                    state.audioMissingStatsPolls = 0;
                    const previous = state.audioLastStats;
                    const packetsReset = Boolean(previous && snapshot.packetsReceived < previous.packetsReceived);
                    const packetsDelta = previous && !packetsReset ? snapshot.packetsReceived - previous.packetsReceived : 0;
                    const bytesDelta = bannerWebRTCStatsDelta(previous, snapshot, 'bytesReceived', packetsReset);
                    const concealedDelta = bannerWebRTCStatsDelta(previous, snapshot, 'concealedSamples', packetsReset);
                    const silentConcealedDelta = bannerWebRTCStatsDelta(previous, snapshot, 'silentConcealedSamples', packetsReset);
                    const jitterBufferEmittedDelta = bannerWebRTCStatsDelta(previous, snapshot, 'jitterBufferEmittedCount', packetsReset);
                    state.audioLastStats = snapshot;
                    window.hazeBannerWebRTCStats = {
                        ...snapshot,
                        packets_delta: packetsDelta,
                        bytes_delta: bytesDelta,
                        concealed_samples_delta: concealedDelta,
                        silent_concealed_samples_delta: silentConcealedDelta,
                        jitter_buffer_emitted_delta: jitterBufferEmittedDelta,
                        packets_reset: packetsReset,
                        stats_source: statsResult.source,
                        connection_state: peer.connectionState,
                        ice_state: peer.iceConnectionState,
                        packets_recent: hasRecentBannerAudioPackets(),
                        at: new Date().toISOString(),
                    };
                    if (previous && !packetsReset && packetsDelta <= 0 && peer.connectionState === 'connected') {
                        state.audioStagnantStatsPolls += 1;
                        if (state.audioStagnantStatsPolls === AUDIO_STAGNANT_STATS_POLLS) {
                            console.warn('Banner WebRTC inbound audio packets stalled.', window.hazeBannerWebRTCStats);
                        }
                        if (shouldReconnectBannerAudioForMissingPackets() && state.audioStagnantStatsPolls >= AUDIO_RECOVER_STATS_POLLS) {
                            console.warn('Banner WebRTC inbound audio packets stayed stalled; reconnecting.', window.hazeBannerWebRTCStats);
                            scheduleAudioReconnect({ force: true });
                        }
                    } else {
                        if (packetsDelta > 0 || snapshot.packetsReceived > 0) {
                            markBannerAudioPacketsRecent();
                            ensureBannerAudioPlaying();
                        }
                        state.audioStagnantStatsPolls = 0;
                    }
                } catch (error) {
                    console.warn('Unable to read banner WebRTC stats.', error);
                }
            }, AUDIO_STATS_INTERVAL_MS);
        }

        async function readInboundAudioStats(source, trackId = '') {
            const report = await source.getStats();
            let selected = null;
            const expectedTrackId = String(trackId || '').trim();
            report.forEach((stats) => {
                const kind = stats.kind || stats.mediaType;
                if (stats.type !== 'inbound-rtp' || stats.isRemote || (kind && kind !== 'audio')) return;
                const statsTrackId = String(stats.trackIdentifier || '').trim();
                if (expectedTrackId && statsTrackId && statsTrackId !== expectedTrackId) return;
                const statsTimestamp = Number(stats.timestamp || 0);
                const selectedTimestamp = Number(selected?.timestamp || 0);
                if (!selected
                    || statsTimestamp > selectedTimestamp
                    || (statsTimestamp === selectedTimestamp && (stats.packetsReceived || 0) > (selected.packetsReceived || 0))) {
                    selected = stats;
                }
            });
            if (!selected) return null;
            return {
                packetsReceived: Number(selected.packetsReceived || 0),
                bytesReceived: Number(selected.bytesReceived || 0),
                packetsLost: Number(selected.packetsLost || 0),
                jitter: Number(selected.jitter || 0),
                concealedSamples: Number(selected.concealedSamples || 0),
                silentConcealedSamples: Number(selected.silentConcealedSamples || 0),
                jitterBufferDelay: Number(selected.jitterBufferDelay || 0),
                jitterBufferEmittedCount: Number(selected.jitterBufferEmittedCount || 0),
                trackIdentifier: selected.trackIdentifier || '',
                timestamp: selected.timestamp || performance.now(),
            };
        }

        async function readActiveInboundAudioStats(receiver, peer, trackId = '') {
            if (receiver?.getStats) {
                const snapshot = await readInboundAudioStats(receiver, trackId);
                if (snapshot) return { snapshot, source: 'receiver' };
            }
            if (peer?.getStats) {
                const snapshot = await readInboundAudioStats(peer, trackId);
                if (snapshot) return { snapshot, source: 'peer' };
            }
            return null;
        }

        function closeAudioPeerOnly() {
            clearAudioTransientTimers();
            stopAudioStatsMonitor();
            stopAudioPlaybackWatchdog();
            state.audioTrackAttached = false;
            state.audioReceiver = null;
            state.audioTrackId = '';
            state.audioRemoteStream = null;
            state.audioLastStats = null;
            state.audioLastPacketAt = 0;
            state.audioStagnantStatsPolls = 0;
            state.audioMissingStatsPolls = 0;
            state.audioFallbackStream = null;
            if (state.audioPeer) {
                state.audioPeer.ontrack = null;
                state.audioPeer.onconnectionstatechange = null;
                state.audioPeer.close();
                state.audioPeer = null;
            }
        }

        function clearAudioTransientTimers() {
            if (state.audioDisconnectTimer) {
                window.clearTimeout(state.audioDisconnectTimer);
                state.audioDisconnectTimer = null;
            }
        }

        function hasRecentBannerAudioPackets(now = Date.now()) {
            return state.audioLastPacketAt > 0 && now - state.audioLastPacketAt <= AUDIO_RECENT_PACKET_GRACE_MS;
        }

        function bannerWebRTCStatsDelta(previous, snapshot, field, reset = false) {
            if (!previous || reset) return 0;
            return Number(snapshot?.[field] || 0) - Number(previous?.[field] || 0);
        }

        function hasLiveBannerAudioTrack() {
            const tracks = [
                ...(state.audioElement?.srcObject?.getAudioTracks?.() || []),
                ...(state.audioRemoteStream?.getAudioTracks?.() || []),
            ];
            return tracks.some((track) => track.readyState === 'live');
        }

        function hasUsableBannerAudio() {
            return Boolean(state.audioTrackAttached || hasLiveBannerAudioTrack());
        }

        function shouldReconnectBannerAudioForMissingPackets() {
            return !hasUsableBannerAudio() || !hasRecentBannerAudioPackets();
        }

        function markBannerAudioPacketsRecent() {
            state.audioLastPacketAt = Date.now();
            cancelAudioReconnect();
            if (state.audioDisconnectTimer) {
                window.clearTimeout(state.audioDisconnectTimer);
                state.audioDisconnectTimer = null;
            }
        }

        function ensureBannerAudioPlaying() {
            const audio = state.audioElement;
            if (!query.audio || !audio || !audio.paused) return;
            recordBannerAudioEvent('audio_resume_attempt', {
                ready_state: audio.readyState,
                network_state: audio.networkState,
                has_live_track: hasLiveBannerAudioTrack(),
                packets_recent: hasRecentBannerAudioPackets(),
            });
            const playPromise = audio.play();
            if (playPromise && typeof playPromise.catch === 'function') {
                playPromise
                    .then(() => {
                        recordBannerAudioEvent('audio_resume_ok', {
                            paused: audio.paused,
                            ready_state: audio.readyState,
                        });
                    })
                    .catch((error) => {
                        recordBannerAudioEvent('audio_resume_blocked', {
                            error: error?.name || 'play_failed',
                        });
                    });
            }
        }

        function handleStreamPayload(event) {
            try {
                const payload = JSON.parse(event.data || '{}');
                renderPayload(payload);
            } catch {
                syncOBSAlertState(false);
                renderIdle();
                console.error('Invalid banner data stream.');
            }
        }

        function connectStream() {
            if (!('EventSource' in window)) {
                renderIdle();
                console.error('This browser does not support the live banner stream.');
                return;
            }

            closeStream();
            const source = new EventSource(streamUrl());
            state.stream = source;
            source.addEventListener('banner', handleStreamPayload);
            source.onerror = () => {
                if (!state.payload) {
                    renderIdle();
                }
            };
        }

        function connectAudioStream() {
            if (!query.audio || !query.feed || !('RTCPeerConnection' in window)) {
                return;
            }

            closeAudioStream();

            const pc = new RTCPeerConnection();
            state.audioPeer = pc;
            state.audioFallbackStream = new MediaStream();
            startAudioPlaybackWatchdog();
            const audio = bannerAudioElement();
            audio.pause();
            audio.srcObject = null;
            audio.removeAttribute('src');
            audio.autoplay = true;
            audio.playsInline = true;
            audio.muted = false;
            audio.volume = 1;

            pc.addTransceiver('audio', { direction: 'recvonly' });
            pc.ontrack = (event) => {
                const usedFallbackStream = !event.streams?.[0];
                const stream = event.streams?.[0] || state.audioFallbackStream || new MediaStream();
                if (!stream.getTracks().some((track) => track.id === event.track.id)) {
                    stream.addTrack(event.track);
                }
                recordBannerAudioEvent('track_attached', {
                    used_fallback_stream: usedFallbackStream,
                    stream_track_count: stream.getTracks().length,
                    track_state: event.track.readyState || '',
                });
                state.audioReceiver = event.receiver || null;
                state.audioTrackId = event.track.id || '';
                state.audioRemoteStream = stream;
                state.audioLastStats = null;
                state.audioStagnantStatsPolls = 0;
                state.audioMissingStatsPolls = 0;
                state.audioTrackAttached = true;
                event.track.onended = () => {
                    recordBannerAudioEvent('track_ended', {
                        connection_state: pc.connectionState,
                        ice_state: pc.iceConnectionState,
                    });
                    scheduleAudioReconnect({ force: true });
                };
                audio.srcObject = stream;
                const playPromise = audio.play();
                if (playPromise && typeof playPromise.catch === 'function') {
                    playPromise.catch(() => console.error('Unable to autoplay banner WebRTC audio.'));
                }
            };

            pc.onconnectionstatechange = () => {
                recordBannerAudioEvent('connection_state', {
                    connection_state: pc.connectionState,
                    ice_state: pc.iceConnectionState,
                    signaling_state: pc.signalingState || '',
                    track_attached: state.audioTrackAttached,
                    has_live_track: hasLiveBannerAudioTrack(),
                });
                if (pc.connectionState === 'connected') {
                    cancelAudioReconnect();
                    ensureBannerAudioPlaying();
                    clearAudioTransientTimers();
                    state.audioRetryCount = 0;
                } else if (pc.connectionState === 'disconnected') {
                    scheduleAudioDisconnectReconnect(pc);
                } else if (['failed', 'closed'].includes(pc.connectionState)) {
                    scheduleAudioReconnect({ force: true });
                }
            };

            pc.createOffer()
                .then((offer) => pc.setLocalDescription(offer))
                .then(() => fetch(`${API_BASE}/banner/webrtc/offer`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({
                        feed_id: query.feed,
                        sdp: pc.localDescription?.sdp || '',
                        require_opus: false,
                        codec: query.audioCodec === 'auto' ? '' : query.audioCodec,
                    }),
                }))
                .then((response) => {
                    if (!response.ok) {
                        throw new Error(`Banner WebRTC failed: ${response.status}`);
                    }
                    return response.json();
                })
                .then((answer) => {
                    recordBannerAudioEvent('answer_received', {
                        codec: answer.codec || '',
                        payload_type: answer.payload_type ?? null,
                        media_recent: answer.media_recent !== false,
                    });
                    return pc.setRemoteDescription({ type: 'answer', sdp: answer.sdp });
                })
                .then(() => {
                    state.audioRetryCount = 0;
                    startAudioStatsMonitor(pc);
                })
                .catch((error) => {
                    console.error(error);
                    scheduleAudioReconnect({ force: true });
                });
        }

        function scheduleAudioDisconnectReconnect(peer) {
            if (!query.audio || state.unloading || state.audioDisconnectTimer) {
                return;
            }
            state.audioDisconnectTimer = window.setTimeout(() => {
                state.audioDisconnectTimer = null;
                if (state.audioPeer === peer && peer.connectionState === 'disconnected') {
                    scheduleAudioReconnect({ force: true });
                }
            }, AUDIO_DISCONNECT_GRACE_MS);
        }

        function scheduleAudioReconnect({ force = false } = {}) {
            if (!query.audio || state.unloading) {
                return;
            }
            if (state.audioReconnectPending) {
                return;
            }
            recordBannerAudioEvent('reconnect_scheduled', {
                force,
                connection_state: state.audioPeer?.connectionState || '',
                ice_state: state.audioPeer?.iceConnectionState || '',
                track_attached: state.audioTrackAttached,
                has_live_track: hasLiveBannerAudioTrack(),
                last_packet_age_ms: state.audioLastPacketAt ? Date.now() - state.audioLastPacketAt : null,
            });
            if (state.audioReconnectTimer) {
                if (!force) {
                    return;
                }
                window.clearTimeout(state.audioReconnectTimer);
                state.audioReconnectTimer = null;
            }
            state.audioReconnectPending = true;
            if (state.audioDisconnectTimer) {
                window.clearTimeout(state.audioDisconnectTimer);
                state.audioDisconnectTimer = null;
            }
            const delay = Math.min(1000 * (2 ** state.audioRetryCount), 10000);
            state.audioRetryCount += 1;
            state.audioReconnectTimer = window.setTimeout(() => {
                state.audioReconnectTimer = null;
                state.audioReconnectPending = false;
                closeAudioPeerOnly();
                connectAudioStream();
            }, delay);
        }

        function cancelAudioReconnect() {
            if (state.audioReconnectTimer) {
                window.clearTimeout(state.audioReconnectTimer);
                state.audioReconnectTimer = null;
            }
            state.audioReconnectPending = false;
        }

        applyFrameSettings();
        window.addEventListener('resize', applyViewportScale);
        window.addEventListener('beforeunload', () => {
            state.unloading = true;
            syncOBSAlertState(false);
            closeStream();
            closeAudioStream();
        });
        connectStream();
        connectAudioStream();
    </script>
</body>
</html>
