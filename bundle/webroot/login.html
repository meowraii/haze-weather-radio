<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Haze Weather Radio admin sign in">
    <title>Haze Weather Radio Sign In</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/assets/styles.css">
    <link rel="stylesheet" href="/assets/layout.css">
    <style>.brand-home-link{display:inline-flex;align-items:center;color:inherit;text-decoration:none}</style>
</head>
<body class="login-body">
    <main class="login-page">
        <section class="login-panel" aria-labelledby="loginTitle">
            <header class="login-header">
                <a class="brand-home-link" href="/" aria-label="Open public page">
                    <img class="login-mark brand-mark-light" src="/assets/haze-alerting.svg" alt="Haze Alerting Platform">
                    <img class="login-mark brand-mark-dark" src="/assets/haze-alerting-dark.svg" alt="" aria-hidden="true">
                </a>
                <div class="login-title-block">
                    <h1 id="loginTitle">Haze Weather Radio</h1>
                    <p id="loginSubtitle">Haze Weather Radio</p>
                </div>
            </header>

            <form id="loginForm" class="login-form">
                <label for="usernameInput">Username</label>
                <input id="usernameInput" name="username" type="text" autocomplete="username" maxlength="50" autofocus required>
                <label for="passwordInput">Password</label>
                <input id="passwordInput" name="password" type="password" autocomplete="current-password" required>
                <div id="mfaFields" class="login-mfa-fields" hidden>
                    <label for="totpInput">Authentication code</label>
                    <input id="totpInput" name="totp" type="text" autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6">
                    <div id="mfaEnrollment" class="login-enrollment" hidden>
                        <strong>MFA enrollment required</strong>
                        <p>Add this secret to your authenticator, then enter its current six-digit code.</p>
                        <code id="mfaEnrollmentSecret"></code>
                    </div>
                </div>
                <label class="login-persistent-option">
                    <input id="persistentInput" name="persistent" type="checkbox">
                    <span>Keep this session signed in</span>
                </label>
                <button type="submit" id="loginButton">
                    <span>Sign in</span>
                </button>
                <p class="auth-status" id="authStatus">Authorized operators only.</p>
            </form>
        </section>
    </main>

    <script type="module" src="/assets/js/login.js"></script>
</body>
</html>
