<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SAME Broadcast — Haze Weather Radio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/styles.css">
    <link rel="stylesheet" href="/assets/same-page.css">
</head>
<body>
    <div class="app-shell">

        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-mark"></div>
                <div>
                    <p class="brand-name">Haze WXR</p>
                    <p class="brand-sub">Manual Alerting</p>
                </div>
            </div>

            <nav class="sidebar-section">
                <p class="sidebar-label">Navigation</p>
                <a class="sidebar-link" href="/">
                    <i data-lucide="house" width="15" height="15"></i>
                    Dashboard
                </a>
                <a class="sidebar-link" href="/editor">
                    <i data-lucide="pencil-line" width="15" height="15"></i>
                    File Editor
                </a>
                <a class="sidebar-link" href="/wx">
                    <i data-lucide="cloud-sun" width="15" height="15"></i>
                    WX On-Demand
                </a>
                <a class="sidebar-link active" href="/same">
                    <i data-lucide="radio-tower" width="15" height="15"></i>
                    SAME Broadcast
                </a>
            </nav>

            <div class="sidebar-section">
                <p class="sidebar-label">Reference</p>
                <div class="status-row">
                    <span class="status-dot" id="apiDot" data-state="pending"></span>
                    <span class="status-key">API</span>
                    <span class="status-val" id="healthPill">Checking…</span>
                </div>
            </div>

            <div class="sidebar-footer">
                <button id="themeToggle" type="button" class="theme-toggle">
                    <i data-lucide="sun" width="13" height="13"></i>
                    <span>Dark mode</span>
                </button>
            </div>
        </aside>

        <div class="main-wrap">
            <header class="topbar">
                <div class="topbar-inner">
                    <div class="topbar-title">
                        <p class="topbar-eyebrow">Manual Alerting</p>
                        <h1>SAME Broadcast</h1>
                        <p>Compose and air a SAME/EAS sequence directly into a feed queue.</p>
                    </div>
                </div>
            </header>

            <main class="dashboard same-page">

                <div class="same-layout">
                    <div class="same-main" id="sameMain"></div>
                    <aside class="same-rail" id="sameRail"></aside>
                </div>

            </main>
        </div>

    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script type="module" src="/assets/js/same.js"></script>
</body>
</html>
