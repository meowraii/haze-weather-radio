name: Build

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  GOFLAGS: -mod=readonly

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg g++ libasound2-dev libopus-dev pkg-config \
            libavcodec-dev libavformat-dev libavutil-dev libavfilter-dev \
            libswresample-dev libswscale-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-libav gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly
          pkg-config --exists libavcodec opus gstreamer-1.0 gstreamer-app-1.0
          ffmpeg -hide_banner -version
          c++ --version

      - name: Install Windows native build dependencies
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-ffmpeg
            mingw-w64-clang-x86_64-gstreamer
            mingw-w64-clang-x86_64-gst-libav
            mingw-w64-clang-x86_64-gst-plugins-base
            mingw-w64-clang-x86_64-gst-plugins-good
            mingw-w64-clang-x86_64-gst-plugins-bad
            mingw-w64-clang-x86_64-gst-plugins-ugly
            mingw-w64-clang-x86_64-libc++
            mingw-w64-clang-x86_64-libunwind
            mingw-w64-clang-x86_64-opus
            mingw-w64-clang-x86_64-opusfile
            mingw-w64-clang-x86_64-pkgconf

      - name: Configure Windows native build environment
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $msysRoot = "C:\msys64"
          $clang64 = Join-Path $msysRoot "clang64"
          $bin = Join-Path $clang64 "bin"
          $usrBin = Join-Path $msysRoot "usr\bin"
          $pkgConfig = Join-Path $bin "pkg-config.exe"
          if (-not (Test-Path -LiteralPath $pkgConfig)) {
            $pkgConfig = Join-Path $bin "pkgconf.exe"
          }
          if (-not (Test-Path -LiteralPath $pkgConfig)) {
            throw "Missing pkg-config/pkgconf executable under $bin"
          }
          $pkgConfigPath = "$clang64\lib\pkgconfig;$clang64\share\pkgconfig"
          $ffmpegPkgConfigPath = "$clang64\lib\pkgconfig"
          function Set-CiEnv {
            param([string] $Name, [string] $Value)
            Set-Item -Path "Env:$Name" -Value $Value
            "$Name=$Value" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }
          $env:Path = "$bin;$usrBin;$env:Path"
          Add-Content -Path $env:GITHUB_PATH -Value $bin
          Set-CiEnv "PKG_CONFIG" $pkgConfig
          Set-CiEnv "PKG_CONFIG_PATH" $pkgConfigPath
          Set-CiEnv "PKG_CONFIG_ALLOW_CROSS" "1"
          Set-CiEnv "FFMPEG_PKG_CONFIG_PATH" $ffmpegPkgConfigPath
          Set-CiEnv "LIBCLANG_PATH" $bin
          Set-CiEnv "CXX_STDLIB" "c++"
          Set-CiEnv "CXXSTDLIB_x86_64_pc_windows_gnullvm" "c++"
          Set-CiEnv "BINDGEN_EXTRA_CLANG_ARGS_x86_64_pc_windows_gnullvm" "--target=x86_64-w64-windows-gnu"
          Set-CiEnv "CARGO_TARGET_X86_64_PC_WINDOWS_GNULLVM_LINKER" "x86_64-w64-mingw32-clang.exe"
          Set-CiEnv "CC_x86_64_pc_windows_gnullvm" "x86_64-w64-mingw32-clang.exe"
          Set-CiEnv "CXX_x86_64_pc_windows_gnullvm" "x86_64-w64-mingw32-clang++.exe"
          Set-CiEnv "AR_x86_64_pc_windows_gnullvm" "llvm-ar.exe"
          foreach ($package in @("glib-2.0", "libavcodec", "opus", "gstreamer-1.0", "gstreamer-app-1.0", "gstreamer-audio-1.0", "gstreamer-video-1.0")) {
            & $pkgConfig --print-errors --exists $package
            if ($LASTEXITCODE -ne 0) {
              throw "MSYS2 CLANG64 package check failed for $package"
            }
          }
          & (Join-Path $bin "ffmpeg.exe") -hide_banner -version
          if ($LASTEXITCODE -ne 0) {
            throw "MSYS2 CLANG64 ffmpeg failed its version check"
          }
          foreach ($nativeTool in @("x86_64-w64-mingw32-clang++.exe", "libclang.dll")) {
            $nativePath = Join-Path $bin $nativeTool
            if (-not (Test-Path -LiteralPath $nativePath -PathType Leaf)) {
              throw "Missing MSDF native build dependency: $nativePath"
            }
          }
          foreach ($nativePath in @((Join-Path $clang64 "lib\libc++.dll.a"), (Join-Path $bin "libc++.dll"))) {
            if (-not (Test-Path -LiteralPath $nativePath -PathType Leaf)) {
              throw "Missing MSDF C++ runtime dependency: $nativePath"
            }
          }

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/go/go.mod
          check-latest: true
          cache: true
          cache-dependency-path: services/go/go.sum

      - name: Set up Rust
        if: runner.os != 'Windows'
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Rust for Windows
        if: runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnullvm

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2

      - name: Vet Go services
        working-directory: services/go
        env:
          CGO_ENABLED: ${{ runner.os == 'Windows' && '0' || '1' }}
        run: go vet ./...

      - name: Test Go services
        working-directory: services/go
        env:
          CGO_ENABLED: ${{ runner.os == 'Windows' && '0' || '1' }}
        run: go test -count=1 ./...

      - name: Test Rust workspace
        run: cargo test --workspace --locked ${{ runner.os == 'Windows' && '--target x86_64-pc-windows-gnullvm' || '' }}

      - name: Test CGEN GPU and MSDF path
        run: cargo test -p haze-cgen --features gpu-wgpu --locked ${{ runner.os == 'Windows' && '--target x86_64-pc-windows-gnullvm' || '' }}

  windows-bundle:
    name: Build Windows Bundle
    runs-on: windows-latest
    needs: test
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MSYS2 CLANG64 dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-ffmpeg
            mingw-w64-clang-x86_64-gstreamer
            mingw-w64-clang-x86_64-gst-libav
            mingw-w64-clang-x86_64-gst-plugins-base
            mingw-w64-clang-x86_64-gst-plugins-good
            mingw-w64-clang-x86_64-gst-plugins-bad
            mingw-w64-clang-x86_64-gst-plugins-ugly
            mingw-w64-clang-x86_64-libc++
            mingw-w64-clang-x86_64-libunwind
            mingw-w64-clang-x86_64-opus
            mingw-w64-clang-x86_64-opusfile
            mingw-w64-clang-x86_64-pkgconf

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/go/go.mod
          check-latest: true
          cache: true
          cache-dependency-path: services/go/go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnullvm

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2

      - name: Fetch Rust dependencies
        run: cargo fetch --locked

      - name: Build Haze bundle
        shell: pwsh
        run: ./scripts/build-haze.ps1 -Profile release -OutputDir dist/Haze_UAP-Windows-x86_64-Portable

      - name: Verify synced bundle directories
        shell: pwsh
        run: |
          $bundle = "dist/Haze_UAP-Windows-x86_64-Portable"
          foreach ($dir in @("audio", "managed", "webroot")) {
            if (-not (Test-Path -LiteralPath (Join-Path $bundle $dir) -PathType Container)) {
              throw "Missing synced bundle directory: $dir"
            }
          }

      - name: Create portable tar.xz
        shell: pwsh
        run: |
          $archive = "dist/Haze_UAP-Windows-x86_64-Portable.tar.xz"
          if (Test-Path -LiteralPath $archive) {
            Remove-Item -LiteralPath $archive -Force
          }
          tar -cJf $archive -C dist Haze_UAP-Windows-x86_64-Portable
          if ($LASTEXITCODE -ne 0) {
            throw "tar failed with exit code $LASTEXITCODE"
          }
          if (-not (Test-Path -LiteralPath $archive -PathType Leaf)) {
            throw "Missing archive: $archive"
          }

      - name: Upload Haze portable tar.xz
        uses: actions/upload-artifact@v4
        with:
          name: Haze_UAP-Windows-x86_64-Portable-${{ github.sha }}.tar.xz
          path: dist/Haze_UAP-Windows-x86_64-Portable.tar.xz
          if-no-files-found: error
          retention-days: 14

  linux-bundle:
    name: Build Linux Bundle
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg g++ libasound2-dev libopus-dev pkg-config \
            libavcodec-dev libavformat-dev libavutil-dev libavfilter-dev \
            libswresample-dev libswscale-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-libav gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly
          pkg-config --exists libavcodec opus gstreamer-1.0 gstreamer-app-1.0
          ffmpeg -hide_banner -version
          c++ --version

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/go/go.mod
          check-latest: true
          cache: true
          cache-dependency-path: services/go/go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2

      - name: Fetch Rust dependencies
        run: cargo fetch --locked

      - name: Build Haze bundle
        run: bash scripts/build-haze.sh --profile release --output-dir dist/Haze_UAP-Linux-x86_64-Portable

      - name: Verify synced bundle directories
        run: |
          bundle="dist/Haze_UAP-Linux-x86_64-Portable"
          for dir in audio managed webroot; do
            test -d "$bundle/$dir" || { echo "Missing synced bundle directory: $dir" >&2; exit 1; }
          done

      - name: Create portable tar.xz
        run: tar -cJf dist/Haze_UAP-Linux-x86_64-Portable.tar.xz -C dist Haze_UAP-Linux-x86_64-Portable

      - name: Upload Haze portable tar.xz
        uses: actions/upload-artifact@v4
        with:
          name: Haze_UAP-Linux-x86_64-Portable-${{ github.sha }}.tar.xz
          path: dist/Haze_UAP-Linux-x86_64-Portable.tar.xz
          if-no-files-found: error
          retention-days: 14

  freebsd-bundle:
    name: Build FreeBSD Bundle
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and test in FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.2"
          usesh: true
          prepare: |
            pkg update -f
            LLVM_PACKAGE="$(pkg search -q -x '^llvm[0-9]+-[0-9].*' | sort -V | tail -n 1)"
            test -n "${LLVM_PACKAGE}" || { echo "No versioned LLVM package is available" >&2; exit 1; }
            pkg install -y bash ca_root_nss curl rust pkgconf ffmpeg opus gstreamer1 gstreamer1-plugins gstreamer1-libav "${LLVM_PACKAGE}"
            pkg info -l "${LLVM_PACKAGE}" | grep -Eq '/libclang\.so([.]|$)' || { echo "${LLVM_PACKAGE} does not provide libclang" >&2; exit 1; }
            pkgconf --exists libavcodec opus gstreamer-1.0 gstreamer-app-1.0
            GO_VERSION="$(awk '/^go / { print $2; exit }' services/go/go.mod)"
            fetch -o /tmp/go.tar.gz "https://go.dev/dl/go${GO_VERSION}.freebsd-amd64.tar.gz"
            rm -rf /usr/local/go
            tar -C /usr/local -xzf /tmp/go.tar.gz
          run: |
            export PATH="/usr/local/go/bin:${PATH}"
            LIBCLANG_FILE="$(find /usr/local -maxdepth 3 -type f -name 'libclang.so*' -print -quit)"
            test -n "${LIBCLANG_FILE}" || { echo "libclang is required for the FreeBSD MSDF build" >&2; exit 1; }
            export LIBCLANG_PATH="$(dirname "${LIBCLANG_FILE}")"
            export CXX="${CXX:-c++}"
            export CXX_STDLIB=c++
            go version
            rustc --version
            cargo --version
            "${CXX}" --version
            cd services/go
            go test ./...
            cd ../..
            cargo test --workspace
            cargo test -p haze-cgen --features gpu-wgpu
            bash scripts/build-haze.sh --profile release

      - name: Upload FreeBSD Haze bundle
        uses: actions/upload-artifact@v4
        with:
          name: Haze_UAP-FreeBSD-x86_64-Portable-${{ github.sha }}
          path: dist/Haze_UAP-FreeBSD-x86_64-Portable
          if-no-files-found: error
          retention-days: 14
