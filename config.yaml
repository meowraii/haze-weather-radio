version: 26.07.14
daemon_settings_file: runtime/state/daemonSettings.json

storage:
  sqlite:
    enabled: true
    path: runtime/state/haze.db
    auto_migrate: true
    busy_timeout: "30s"
    max_open_conns: 1
  postgres:
    enabled: false
    dsn_env: HAZE_POSTGRES_DSN
    auto_migrate: true
    max_conns: 8
    timeout: "5s"
    app_name: "haze-weather-radio"

services:
  rust:
    media:
      enabled: true
      addr: "127.0.0.1:8097"
      backend: "auto" # auto, gstreamer, or legacy
      webrtc:
        public_ip: "" # Public IPv4 address advertised to internet listeners behind NAT.
        udp_port_min: 0 # Set both ports and forward the same UDP range through the gateway.
        udp_port_max: 0
      audio_processing:
        loudness_enabled: true
        gain_db: 3
        compressor_threshold_dbfs: -18
        compressor_ratio: 3
        compressor_makeup_db: 1.5
        limiter_ceiling: 0.98
      scheduler:
        windows_priority: high
        nice: 0
    playout:
      enabled: true
      alert_poll: "500ms"
      ffmpeg: "ffmpeg"
      scheduler:
        windows_priority: high
        nice: 0
    cgen:
      enabled: false
      config: "managed/configs/cgen.xml"
      scheduler:
        # Keep CGEN responsive without letting it starve playout, media, or drivers.
        windows_priority: above_normal # normal, above_normal, high, realtime
        nice: -2 # -20 highest priority, 19 lowest
    cap_ingest:
      enabled: true
      shadow: false
      source_id: "rust-cap"
      source: "naads"
      mode: "tcp"
      url: "tcp://streaming1.naad-adna.pelmorex.com:8080"
      fallback_url: "tcp://streaming2.naad-adna.pelmorex.com:8080"
      archive_url: "http://capcp1.naad-adna.pelmorex.com"
      fallback_archive_url: "http://capcp2.naad-adna.pelmorex.com"
      interval: "5s" # only used by NWS/Atom polling mode; NAADS TCP mode is continuous
      timeout: "15s"
      startup_seed: true
      concurrency: 8
    easnet:
      enabled: true
      config: "managed/configs/easnet.xml"
      scheduler:
        windows_priority: normal
        nice: 0
  go:
    enabled: true
    web_gateway:
      enabled: true
    data_ingest:
      enabled: true
      interval: "45m"
      timeout: "20s"
    tts:
      enabled: true
      readers: "managed/configs/readers.xml"
      dictionary: "managed/dictionary.json"
      provider: "auto"
      language: "en-US"
      timezone: "Local"
      out_dir: "runtime/audio/tts"
      cache_dir: "runtime/cache/tts"
      cache_max_bytes: 536870912
      cache_max_entries: 4096
      timeout: "60s"
      piper_voices_dir: "managed/voices/piper"
      kokoro_model_dir: "managed/voices/kokoro-multi-lang-v1_0"
      kokoro_runtime_provider: "cpu" # cpu, cuda, or coreml
      kokoro_threads: 1
      kokoro_speed: 1.0
      kokoro_length_scale: 1.0
      speakyapi_url: "" # optional, e.g. http://127.0.0.1:5000
      runtime_idle_timeout: "30s"
    product_render:
      enabled: true
      refresh: "5m"
      cleanup:
        enabled: true
        hour: 3
        minute: 0
    playlist:
      enabled: true
      tick: "500ms"
      lookahead: "2m"
      max_queued: 3
      out_dir: "runtime/audio/playlist"
      fixed_tolerance_s: 4
      routine_estimate_s: 35
    webhook:
      enabled: true
      webhooks: "managed/configs/webhooks.xml"
      listen_base_url: "" # or set HAZE_PUBLIC_BASE_URL in .env for Discord-visible links
      timeout: "15s"
    ivr:
      enabled: true
      mode: sip-edge # sip-edge or provider-webhook
      prompts_file: "managed/configs/ivr.xml"
      extensions:
        - extension: "haze"
          name:
            text: "Canada"
            pronunciation: "Canada"
          name_position: "before"
          province: "CA"
          enabled: true
        - extension: "100"
          name: "Nova Scotia"
          province: "NS"
          enabled: false
        - extension: "170"
          name: "New Brunswick"
          province: "NB"
          enabled: false
        - extension: "180"
          name: "Prince Edward Island"
          province: "PE"
          enabled: false
        - extension: "200"
          name: "Newfoundland and Labrador"
          province: "NL"
          enabled: false
        - extension: "300"
          name: "Quebec"
          province: "QC"
          enabled: false
        - extension: "400"
          name: "Ontario"
          province: "ON"
          enabled: false
        - extension: "500"
          name: "Manitoba"
          province: "MB"
          enabled: true
        - extension: "600"
          name:
            text: "Saskatchewan"
            pronunciation: "Saskatchewan"
          name_position: "before"
          province: "SK"
          enabled: true
        - extension: "700"
          name: "Alberta"
          province: "AB"
          enabled: true
        - extension: "800"
          name: "British Columbia"
          province: "BC"
          enabled: false
        - extension: "900"
          name: "Yukon"
          province: "YT"
          enabled: false
        - extension: "950"
          name: "Northwest Territories"
          province: "NT"
          enabled: false
        - extension: "980"
          name: "Nunavut"
          province: "NU"
          enabled: false
      http:
        enabled: true
        addr: "127.0.0.1:8096"
      sip:
        enabled: true
        listen: "0.0.0.0:5060"
        listen_ports:
          - port: 5060
          - port: 5080
            domain: "teleweather.sip.rai.blue"
        public_host: "71.17.68.130"
        allowed_sources: []
        auth:
          enabled: false
          username: "haze"
          password_env: HAZE_IVR_SIP_PASSWORD
        registration:
          enabled: false
          server: ""
          domain: ""
          register_uri: ""
          username: ""
          auth_username: ""
          password_env: HAZE_IVR_SIP_REGISTER_PASSWORD
          from_user: ""
          contact_user: ""
          contact_host: ""
          via_host: ""
          user_agent: ""
          supported_path: false
          expires: 120
          retry_seconds: 30
      rtp:
        port_min: 30000
        port_max: 39999
      cache:
        dir: "runtime/ivr/cache"
        ttl: "10m"
        phone_sample_rate: 8000
        phone_codec: "g722"
        max_entries: 5000
        stampede_waiters: 64
      default_language: "en-US"
      default_reader_id: "00"
      default_packages: ["current_conditions", "forecast"]
      broadcast_packages: ["alerts", "current_conditions", "air_quality", "forecast", "geophysical_alert"]
      max_call_seconds: 660
      digit_timeout_seconds: 8
      render_timeout: "60s"
      max_concurrent_calls: 256
      max_render_inflight: 8
  daemon:
    enabled: true
    scheduler:
      enabled: true
    alert_queue:
      enabled: false
      interval_ms: 500
    playlist:
      enabled: false
      interval_ms: 750
    runtime_cleanup:
      enabled: true
      interval_minutes: 30
      rules:
        - path: runtime/tmp
          max_age_minutes: 30
        - path: runtime/audio/previews
          max_age_minutes: 30
        - path: runtime/audio/operator-breakin
          max_age_minutes: 30
        - path: runtime/cgen-probe
          max_age_minutes: 30
        - path: runtime/audio/playlist
          max_age_minutes: 360
        - path: runtime/audio/tts
          max_age_minutes: 1440
        - path: runtime/ivr/cache
          max_age_minutes: 1440
        - path: runtime/audio/alerts
          max_age_minutes: 10080
        - path: runtime/audio/easnet
          max_age_minutes: 10080
    split_dns:
      enabled: false
      listen: "0.0.0.0:53"
      ttl_seconds: 60
      records:
        - name: "internal.rai.blue"
          address: "172.16.1.38"

logging:
  level: INFO
  clear_terminal: true
  file:
    enabled: true
    main_path: ./logs/haze-weather-radio.log
    same_path: ./logs/same.log
    web_path: ./logs/webpanel.log
    playout_path: ./logs/playout.log
    rotate:
      max_bytes: 10485760
      backup_count: 5
  console:
    enabled: true

playout:
  sample_rate: 48000
  channels: 1
  pacing:
    package_gap_s: 1
  station_id_schedule:
    enabled: true
    minutes: [0, 15, 30, 45]

  date_time_schedule:
    enabled: true
    minutes: [0, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55]

  chimes:
    enabled: true
    half_hour:
      enabled: true
      # sequence: [chime]
    top_of_hour:
      enabled: true
      # sequence: [chime]

  playlist_order:
    - alerts
    - current_conditions
    - aviation_reports
    - marine_reports
    - marine_forecast
    - air_quality
    - forecast
    - climate_summary
    - thunderstorm_outlook
    - hydrometric
    - geophysical_alert
    - user_bulletin

operator:
  on_air_name: [
    text: "Canada RadioMET",
    pronunciation: "all hazards, canada radio met"
  ]
  telephone_name: [
    text: "TeleWeather",
    pronunciation: "tele weather"
  ]
  operator_name: [
    text: "@meowraii",
    pronunciation: "meow rai"
  ]
  email: [
    address: [
      text: "meowraii",
      pronunciation: "meow rai"
    ],
    domain: [
      text: "mistwx.com",
      pronunciation: "mist wx dot com"
    ]
  ]
  phone: [
    country_code: 1,
    area_code: 639,
    office_code: 872,
    subscriber_number: 9088,
  ]

wx_on_demand: # haze can accept a POST request from external applications with a location code, request packages, and other parameters to generate on demand packages for that location which is then returned to the requester. if the location code matches one of the feed's locations, it will re-use the data and TTS audio files that it has already generated for that location to create the requested package.

  # my plans for this is to have asterisk call a webhook on this app when someone calls a phone number for weather information, and the caller can input their location code using the phone keypad to get a forecast package for their location read back to them over the phone using the TTS engine and audio files generated by haze. this way, you can have an automated telephone weather service without needing to pay for a third party service (ugh).
  enabled: true
  endpoint-base: /api/v1/wx-on-demand/

webpanel:
  enabled: true
  host: "0.0.0.0"
  port: ${PORT}
  public_port:
    enabled: false
    host: "0.0.0.0"
    http_port: 80
    https_port: 443
  public:
    enabled: true
    host: "0.0.0.0"
    port: ${PORT}
    site_name: "${SITE_NAME}"
    alerts_archive:
      access: public # disabled, public
    feeds:
      access: public # disabled, public, auth_required
      webrtc:
        enabled: true
  admin:
    enabled: true
    host: "0.0.0.0"
    port: ${PORT}
  tls:
    enabled: false
    mode: acme # acme or manual
    domains: ["cwrs.rai.blue"] # example: ["radio.example.com"]
    email: "" # optional Let's Encrypt account email
    cache_dir: runtime/tls/acme
    cert_file: "" # manual mode only
    key_file: "" # manual mode only
    redirect_http: true
    hsts: false # only enable after HTTPS is stable for your domain
    staging: false # use Let's Encrypt staging while testing ACME setup
    http_challenge:
      enabled: true
      host: "0.0.0.0"
      port: 80 # Let's Encrypt HTTP-01 must be reachable from the internet on external port 80
  receiver:
    enabled: true
    base_path: /api/receiver/v1
    require_tls: false
    transmitter_defaults:
      bandwidth_khz: 12.5
      deviation_hz: 5000
      preemphasis: none
  authentication:
    enabled: true # protect the operator panel and WebSocket commands.
    mode: accounts # accounts uses PASETO v4.local, peppered Argon2id, MFA, and stateful revocation.
    session_ttl_seconds: 43200
    idle_timeout_seconds: 900
    persistent_session_ttl_seconds: 2592000
    login_rate_limit: 5
    login_rate_window_seconds: 900
    origination_rate_per_second: 2
    enforce_mfa: false # Optional by default. Enrolled accounts still require their current TOTP code.
    redis_required: true
    redis_url_env: HAZE_REDIS_URL
    redis_key_prefix: haze:auth
    paseto_key_env: HAZE_PASETO_V4_LOCAL_KEY
    password_pepper_env: HAZE_PASSWORD_PEPPER
    mfa_key_env: HAZE_MFA_ENCRYPTION_KEY
    audit_key_env: HAZE_AUDIT_HMAC_KEY
    audit_dir: logs
    bootstrap_username_env: HAZE_BOOTSTRAP_ADMIN_USERNAME
    bootstrap_password_env: HAZE_BOOTSTRAP_ADMIN_PASSWORD
    trusted_proxy_cidrs:
      - 127.0.0.0/8
      - ::1/128
      - 172.16.1.31/32 # Servinor Zoraxy reverse proxy.
    login_cidr_allowlist: [] # Empty allows any source. Add operator networks when their public ranges are stable.
    secure_cookies: true # Account mode always enforces Secure cookies and HTTPS.
    max_audio_upload_bytes: 52428800
    # Required keys and the one-time bootstrap password are configured in the private service environment.

feeds_file: ./managed/configs/feeds.xml
outputs_file: ./managed/configs/output.xml

cap:
  cap_cp:
    enabled: true
  nws_cap:
    enabled: false
    sources:
      - id: nws_api
        url: https://api.weather.gov/alerts/active.atom
        queries: [
          "status=actual",
          "message_type=alert,update",
          "severity=extreme,severe,moderate",
          "urgency=immediate,expected",
          "certainty=observed,likely,possible",
        ]

same:
  # !! SENDER IS NOW CONFIGURED IN THE .env FILE !!

  weeklytest: # parameters for Required Weekly Test or Required Monthly Test SAME messages
  #               Typically on Weatheradio Canada, the RWT is broadcast every Wednesday at noon local time, and RMT is broadcast on the first Wednesday of each month at noon local time.
    enabled: true
    weeks: [2, 3, 4] # broadcast the weekly test on these weeks of the month on the specified weekday at the specified time.
    weekday: wed # mon tue wed thu fri sat sun son fon jon con non bod fod nod tod sod 
    hour: 12 # in local time of the station.
    minute: 0
    event_code: RWT
  
  monthlytest:
    enabled: true
    week: 1 # broadcast the monthly test on this week of the month on the specified weekday at the specified time.
    weekday: wed # wed
    hour: 12
    minute: 0
    event_code: RMT
  default_attention_tone: EGG_TIMER # WXR is the 8 second 1050hz tone, NPAS is the Canadian Alerting Attention Signal, which is an 8 second sequence of alternating, 500ms tones. (i hope that kid flipping dies), EAS is an 8 second dual-tone signal of 853 hz and 960 hz sine waves, and egg_timer is the old attention tone used in Ontario's Weatheradio Canada network until 2021 before the AVIPADS system was decommissioned in favor of INOTIFY.

  attention_tone_override: # override the default attention tone for specific event codes. if an event code is not listed here, the default_attention_tone will be used.
    - TOR: WXR
    - SVR: WXR
    - EWW: WXR
    - RMT: WXR
    - BZW: WXR
    - TSW: WXR
    - WFW: WXR
    - FLW: WXR
    - FFW: WXR
    - TRW: WXR
    - SMW: WXR
    - EAN: WXR
    - HUW: WXR
  
  alert_ready_on_NAADS_BIP: true # use the NPAS attention tone for NAADS CAP-CP alerts if they are marked for BI (Broadcast Immediate) on Alert Ready.

  send_txp_on_startup: false # whether to send a Transmitter Primary On SAME message on startup.
